<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Comparativo Artigo a Artigo — Regulamento 2023/0447</title>
<style>
  :root {
    --reg:    #8AAFCF;
    --reg-bg: #F0F7FC;
    --reg-tr: #F7FAFD;
    --rgb:    #7FAA8C;
    --rgb-bg: #F0F7F4;
    --cod:    #B8956A;
    --cod-bg: #FFF9F2;
    --leg:    #75A6AE;
    --leg-bg: #F5FCFD;
    --div:    #A689C6;
    --div-bg: #F9F6FD;
    --nota:   #909090;
    --nota-bg:#FAFAFA;
    --dark:   #2C3E50;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', Calibri, sans-serif; background: #F8F9FB; color: #333; }

  /* HEADER */
  header {
    background: var(--dark);
    color: #fff;
    padding: 18px 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky; top: 0; z-index: 100;
    border-bottom: 1px solid rgba(0,0,0,0.08);
  }
  header h1 { font-size: 1.1rem; font-weight: 700; letter-spacing: .5px; }
  header span { font-size: .85rem; opacity: .7; }

  /* LAYOUT */
  .layout { display: flex; min-height: calc(100vh - 60px); }

  /* SIDEBAR */
  nav {
    width: 220px; min-width: 220px;
    background: var(--dark);
    padding: 24px 0;
    position: sticky; top: 60px;
    height: calc(100vh - 60px);
    overflow-y: auto;
  }
  nav h2 { color: #fff; font-size: .7rem; text-transform: uppercase;
            letter-spacing: 1.5px; padding: 0 20px 12px; font-weight: 700; }
  nav button {
    display: block; width: 100%;
    background: rgba(255,255,255,.04); border: none;
    color: #fff; text-align: left;
    padding: 14px 20px; cursor: pointer;
    font-size: .95rem; line-height: 1.45;
    border-left: 3px solid transparent;
    transition: all .15s;
    font-weight: 500;
  }
  nav button:hover { background: rgba(255,255,255,.12); color: #fff; }
  nav button.active {
    background: rgba(255,255,255,.15);
    color: #fff; font-weight: 700;
    border-left-color: #8AAFCF;
  }
  nav button small { display: block; font-size: .74rem; opacity: .85; margin-top: 2px; color: #e0e0e0; }

  /* MAIN */
  main { flex: 1; padding: 28px 32px; overflow-x: auto; }

  /* BADGE DE ARTIGO */
  .art-badge {
    display: inline-block;
    background: var(--dark); color: #fff;
    border-radius: 6px; padding: 4px 14px;
    font-size: .8rem; font-weight: 700;
    margin-bottom: 18px; letter-spacing: .5px;
  }
  .tema-title {
    font-size: 1.4rem; font-weight: 700;
    color: var(--dark); margin-bottom: 22px;
    padding-bottom: 8px;
    border-bottom: 1px solid rgba(138,175,207,0.25);
  }

  /* FORMATAÇÃO DE TEXTO LEGAL */
  .leg-block + .leg-block { margin-top: 7px; }
  .leg-p { margin: 0; line-height: 1.65; text-align: justify; }
  .leg-alinea {
    margin: 2px 0; line-height: 1.6;
    padding-left: 1.8em; text-indent: -1.8em;
  }
  .leg-sub {
    margin: 2px 0; line-height: 1.55;
    padding-left: 3.2em; text-indent: -1.0em;
  }
  /* Texto secundário (cinza) */
  .leg-block.leg-dim p { color: #b0b0b0; }
  /* Cabeçalho de artigo dentro de coluna (múltiplos artigos por diploma) */
  .leg-art-header {
    font-weight: 700; font-size: .8rem; margin: 10px 0 3px;
    padding-top: 8px; border-top: 1px solid rgba(0,0,0,0.06);
    display: block;
  }
  .leg-block:first-child > .leg-art-header:first-child {
    margin-top: 0; padding-top: 0; border-top: none;
  }

  /* DIVERGÊNCIA ESTRUTURADA */
  .div-section { margin-bottom: 10px; }
  .div-section:last-child { margin-bottom: 0; }
  .div-tag {
    display: inline-block;
    border-radius: 3px; padding: 1px 8px;
    font-size: .72rem; font-weight: 700;
    text-transform: uppercase; letter-spacing: .5px;
    margin-right: 6px; vertical-align: middle;
    white-space: nowrap;
  }
  .div-tag.tag-leg  { background: var(--leg); color: #fff; }
  .div-tag.tag-cod  { background: var(--cod); color: #fff; }
  .div-tag.tag-rgb  { background: var(--rgb); color: #fff; }
  .div-tag.tag-sum  { background: var(--div); color: #fff; }
  .div-text { display: inline; font-size: .87rem; line-height: 1.6; }

  /* GRID 3 COLUNAS (diplomas nacionais) */
  .grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; margin-bottom: 20px; }
  @media (max-width: 1100px) { .grid { grid-template-columns: 1fr 1fr; } }
  @media (max-width: 700px)  { .grid { grid-template-columns: 1fr; } }

  /* CARD */
  .card { border-radius: 6px; overflow: hidden; border: 1px solid rgba(0,0,0,0.06); box-shadow: none; }
  .card-header {
    padding: 10px 16px; font-size: .78rem;
    font-weight: 700; text-transform: uppercase; letter-spacing: .8px;
    color: #fff; display: flex; align-items: center; gap: 10px;
  }
  .card-header-ref {
    font-size: .7rem; font-weight: 400; opacity: .7;
    text-transform: none; letter-spacing: 0;
  }
  .card-body { padding: 14px 16px; font-size: .88rem; line-height: 1.65; }
  .card-ref { font-size: .75rem; font-weight: 700; margin-bottom: 10px; opacity: .75; }

  .card.reg .card-header { background: var(--reg); }
  .card.reg .card-body   { background: var(--reg-bg); }
  .card.reg-tr .card-header { background: #7FAED4; }
  .card.reg-tr .card-body   { background: var(--reg-tr); font-style: italic; }
  .card.rgb .card-header { background: var(--rgb); }
  .card.rgb .card-body   { background: var(--rgb-bg); }
  .card.cod .card-header { background: var(--cod); }
  .card.cod .card-body   { background: var(--cod-bg); }
  .card.leg .card-header { background: var(--leg); }
  .card.leg .card-body   { background: var(--leg-bg); }

  /* DIVERGÊNCIA */
  .div-box {
    background: var(--div-bg);
    border-left: 5px solid var(--div);
    border-radius: 0 8px 8px 0;
    padding: 14px 18px;
    margin-bottom: 20px;
    font-size: .88rem; line-height: 1.6;
  }
  .div-box strong { color: var(--div); display: block; margin-bottom: 6px;
                     font-size: .78rem; text-transform: uppercase; letter-spacing: .8px; }
  .badge-alt {
    display: inline-block;
    background: #8B0000; color: #fff;
    border-radius: 4px; padding: 2px 10px;
    font-size: .75rem; font-weight: 700; margin-left: 10px;
  }

  /* NOTAS */
  .notas-box { margin-top: 4px; }
  .notas-box label {
    display: block; font-size: .78rem; font-weight: 700;
    text-transform: uppercase; letter-spacing: .8px;
    color: var(--nota); margin-bottom: 6px;
  }
  .notas-box textarea {
    width: 100%; min-height: 90px;
    border: 2px solid #ccc; border-radius: 6px;
    padding: 10px; font-size: .88rem; font-family: inherit;
    resize: vertical; background: var(--nota-bg);
    transition: border-color .2s;
  }
  .notas-box textarea:focus { outline: none; border-color: var(--div); }

  /* NAVEGAÇÃO INFERIOR */
  .nav-btns {
    display: flex; gap: 12px; margin-top: 24px; justify-content: flex-end;
  }
  .btn {
    padding: 9px 22px; border: none; border-radius: 6px;
    cursor: pointer; font-size: .9rem; font-weight: 700;
    transition: opacity .15s;
  }
  .btn:hover { opacity: .82; }
  .btn-prev { background: #ddd; color: #333; }
  .btn-next { background: var(--reg); color: #fff; }
  .btn-export { background: var(--rgb); color: #fff; }

  /* EXPORTAÇÃO */
  #export-msg {
    display: none; background: #D5E8D4; border: 1px solid var(--rgb);
    border-radius: 6px; padding: 10px 16px; margin-top: 12px;
    font-size: .85rem; color: var(--rgb);
  }
  pre { white-space: pre-wrap; word-break: break-word; }
  mark { background: #FFE066; color: #000; border-radius: 2px; padding: 0 2px; }

  /* BARRA DE PESQUISA */
  .search-wrap { position: relative; }
  .search-wrap input {
    padding: 7px 32px 7px 12px;
    border-radius: 6px; border: none;
    font-size: .88rem; width: 240px;
    background: rgba(255,255,255,.14); color: #fff;
    outline: none; transition: background .2s;
  }
  .search-wrap input::placeholder { color: rgba(255,255,255,.4); }
  .search-wrap input:focus { background: rgba(255,255,255,.24); }
  .search-wrap .clear-btn {
    position: absolute; right: 8px; top: 50%; transform: translateY(-50%);
    background: none; border: none; color: rgba(255,255,255,.55);
    cursor: pointer; font-size: 1rem; line-height: 1; padding: 0;
    display: none;
  }
  .search-count { color: #90b0c8; font-size: .73rem; padding: 2px 20px 8px; }
</style>
</head>

  <h1>Comparativo Artigo a Artigo — Regulamento 2023/0447 (Cães e Gatos)</h1>

      <input id="search-input" type="search"

<div class="layout">

const ARTIGOS = [

      "texto": "1 — A breeding establishment where at most two litters per calendar year is produced for placing on the market shall only be subject to the obligations laid down in Article 5, Article 6(1) (1b), (1c) and (1d), Article 6a, Article 7, Article 8, Article 11(2), (3) and (3a), Article 12(3), (4) and (7), Article 13(2)(b), (c) and (d), Article 14(2), (3), (4) and (5a), Article 15, Article 15a(1) and point 3 and 4.3 of Annex I.\n\n2 — A shelter, where up to a total of 15 dogs or cats are kept at any given time, or any foster home shall only be subject to the obligations laid down in Article 5, Article 6(1), (1a), (1b), (1c), and (1d), Article 7, Article 8, Article 11(2), (3) and (3a), Article 12(3), (4) and (7), Article 13(2)(a), (b), (c) and (d), Article 14(2), (3), (4) and (5a), Article 15 and point 4.3 of Annex I.",
      "traducao": "1 — Um estabelecimento de criação que produz no máximo duas ninhadas por ano civil para colocação no mercado fica sujeito apenas às obrigações estabelecidas no artigo 5.º, artigo 6.º (n.º 1, alíneas 1b, 1c e 1d), artigo 6a, artigo 7.º, artigo 8.º, artigo 11.º (n.ºs 2, 3 e 3a), artigo 12.º (n.ºs 3, 4 e 7), artigo 13.º (n.º 2, alíneas b, c e d), artigo 14.º (n.ºs 2, 3, 4 e 5a), artigo 15.º, artigo 15a (n.º 1) e ponto 3 e 4.3 do Anexo I.\n\n2 — Um abrigo, onde são mantidos no máximo 15 cães ou gatos em qualquer momento, ou qualquer lar de acolhimento fica sujeito apenas às obrigações estabelecidas no artigo 5.º, artigo 6.º (n.ºs 1, 1a, 1b, 1c e 1d), artigo 7.º, artigo 8.º, artigo 11.º (n.ºs 2, 3 e 3a), artigo 12.º (n.ºs 3, 4 e 7), artigo 13.º (n.º 2, alíneas a, b, c e d), artigo 14.º (n.ºs 2, 3, 4 e 5a), artigo 15.º e ponto 4.3 do Anexo I."

  },
  {
    "id": "ART-05",
    "tema": "Princípios Gerais de Bem-Estar",
    "regulamento": {
      "ref": "Art.º 5.º do Regulamento 2023/0447",
      "titulo": "General welfare principles",
      "texto": "Operators shall apply the following general welfare principles with respect to dogs or cats bred or kept in their establishment:\n\n(a) dogs and cats are provided with water and feed of a quality and of a quantity that enables them to have appropriate nutrition and hydration;\n\n(b) dogs and cats are kept in an appropriate and regularly cleaned physical environment which is secure and comfortable, especially in terms of space, air quality, temperature, light, protection against adverse climatic conditions and ease of movement, preventing overcrowding;\n\n(c) dogs and cats are kept safe, clean and in good health by preventing diseases, injuries, and pain, due in particular to management, handling practices and breeding practices;\n\n(d) dogs and cats are kept in an environment that enables them to exhibit species-specific and social non-harmful behaviour, and to establish a positive relationship with human beings;\n\n(e) dogs and cats are kept in such a way as to optimise their mental state by preventing or reducing negative stimuli in duration and intensity, as well as by maximising opportunities for positive stimuli in duration and intensity, preventing the development of abnormal repetitive and other behaviours indicative of negative animal welfare, and taking into consideration the individual dog's or cat's needs in the different domains referred to in points (a) to (d).",
      "traducao": "Os operadores devem aplicar os seguintes princípios gerais de bem-estar aos cães e gatos criados ou detidos nos seus estabelecimentos:\n\n(a) os cães e gatos são alimentados e abebeirados com água e ração de qualidade e quantidade adequadas a uma nutrição e hidratação apropriadas;\n\n(b) os cães e gatos são mantidos num ambiente físico adequado, regularmente limpo, seguro e confortável, especialmente em termos de espaço, qualidade do ar, temperatura, iluminação, proteção face a condições climáticas adversas e facilidade de movimentação, prevenindo a sobrelotação;\n\n(c) os cães e gatos são mantidos seguros, limpos e com boa saúde, prevenindo doenças, lesões e dor, nomeadamente através de práticas de maneio, manuseamento e reprodução adequadas;\n\n(d) os cães e gatos são mantidos num ambiente que lhes permite exibir comportamentos específicos da espécie e comportamentos sociais não nocivos, e estabelecer uma relação positiva com os seres humanos;\n\n(e) os cães e gatos são mantidos de forma a otimizar o seu estado mental, prevenindo ou reduzindo estímulos negativos em duração e intensidade, maximizando oportunidades de estímulos positivos, prevenindo o desenvolvimento de comportamentos repetitivos anormais, tendo em conta as necessidades individuais do animal nos domínios referidos nas alíneas (a) a (d)."
    },
    "rgbeac": {
      "ref": "al. a) do n.º 1 do art.º 10.º do RGBEAC (proposta, jun. 2025)",
      "texto": "1 — O detentor do animal de companhia deve:\n\na) Assegurar o bem-estar do animal, de acordo com sua espécie, raça, idade e necessidades físicas e etológicas, proporcionando-lhe:\n— Atenção, supervisão, controlo, exercício físico e estímulo mental;\n— Alimentos saudáveis, adequados e convenientes ao seu normal desenvolvimento e acesso permanente a água potável;\n— Condições higiossanitárias que atendam, no mínimo, ao estabelecido no presente decreto-lei e na demais legislação aplicável;\n— Liberdade de movimento, sendo proibidos todos os sistemas de contenção permanentes;\n— Abrigo adequado, em termos de tamanho e qualidade, com vista a proteger de condições atmosféricas adversas, incluindo frio, chuva, sol ou calor excessivos, com cama seca, limpa e confortável;\n— Contato social adequado a cada espécie, de acordo com a sua idade e atividade."
    },
    "codigo": {
      "ref": "n.ºs 1, 2 e 3 do art.º 5.º do Código do Animal (DL n.º 214/2013)",

      "texto": "Artigo 7.º, n.º 1 — As condições de detenção e de alojamento para reprodução, criação, manutenção e acomodação dos animais de companhia devem salvaguardar os seus parâmetros de bem-estar animal, nomeadamente nos termos dos artigos seguintes.\n\nArtigo 9.º, n.º 1 — A temperatura, a ventilação e a luminosidade e obscuridade das instalações devem ser as adequadas à manutenção do conforto e bem-estar das espécies que albergam."

  {
    "id": "ART-06",
    "tema": "Bem-Estar e Detenção",

      "ref": "Art.º 6.º do Regulamento 2023/0447",
      "titulo": "General welfare obligations",
      "texto": "1. Operators shall be responsible for the welfare of dogs or cats kept in the establishments under their responsibility and under their control and to minimise any risks to their welfare.\n\n1a. In the case of foster homes, the responsibility shall lie with the operator on whose behalf dogs or cats are kept. Such operators shall not place more than a total of five dogs or cats or one litter with or without mother in a foster home at any given time and shall provide the foster family with adequate information on the animal welfare obligations as well as the individual needs of the dogs or cats, and shall ensure that the relevant obligations set out by this Regulation are complied with in foster homes. Member States where the foster home is located may provide for a greater number of dogs, cats or litters to be placed in the foster home, provided that the premises of the foster home provide sufficient space, including outdoor space, and that the number of animal caretakers in the foster home is sufficient, to ensure the welfare of the dogs or cats.\n\n1b. Operators shall not subject any dog or cat to cruelty, abuse or mistreatment, including through participation in activities likely to result in cruelty, abuse or mistreatment, to the dogs or cats bred or kept by the operator.\n\n1c. Operators shall not abandon dogs or cats.\n\n1d. Operators who are due to cease the activities of their establishment shall ensure the rehoming of the dogs or cats kept therein either by taking up the pet ownership or by transferring the responsibility or ownership of dogs and cats to other operators or acquirers.\n\n2. Operators shall ensure that dogs or cats are handled by a suitable number of animal caretakers and in order to meet the welfare needs of dogs or cats kept in their establishments and who have the competences required under Article 9.\n\n2a. Operators shall ensure the welfare of the dogs or cats under their responsibility by monitoring animal-based indicators concerning behaviour and physical appearance, and by taking actions based on the results of such monitoring.\n\n2b. The Commission is empowered to adopt delegated acts in accordance with Article 23 supplementing this Regulation by laying down animal-based indicators concerning behaviour and physical appearance and the methods of their measurement.",
      "traducao": "1. Os operadores são responsáveis pelo bem-estar dos cães ou gatos mantidos nos estabelecimentos sob a sua responsabilidade e controlo e devem minimizar quaisquer riscos para o seu bem-estar.\n\n1a. No caso de famílias de acolhimento, a responsabilidade recai sobre o operador em nome de quem os cães ou gatos são mantidos. Esses operadores não devem colocar mais do que um total de cinco cães ou gatos ou uma ninhada com ou sem mãe numa família de acolhimento em qualquer momento e devem fornecer à família de acolhimento informação adequada sobre as obrigações de bem-estar animal, bem como as necessidades individuais dos animais, e devem assegurar que as obrigações relevantes estabelecidas por este Regulamento são cumpridas em famílias de acolhimento. Os Estados-Membros onde a família de acolhimento está localizada podem prever um número maior de cães, gatos ou ninhadas a serem colocadas na família de acolhimento, desde que as instalações da família de acolhimento providenciem espaço suficiente, incluindo espaço ao ar livre, e que o número de cuidadores de animais na família de acolhimento seja suficiente, para assegurar o bem-estar dos cães ou gatos.\n\n1b. Os operadores não devem sujeitar nenhum cão ou gato a crueldade, abuso ou maus-tratos, incluindo através de participação em atividades que possam resultar em crueldade, abuso ou maus-tratos, aos cães ou gatos criados ou mantidos pelo operador.\n\n1c. Os operadores não devem abandonar cães ou gatos.\n\n1d. Os operadores que estejam prestes a cessar as atividades do seu estabelecimento devem assegurar a reintegração dos cães ou gatos mantidos aí, quer através da assunção da posse do animal de companhia, quer através da transferência da responsabilidade ou propriedade dos cães e gatos para outros operadores ou adquirentes.\n\n2. Os operadores devem assegurar que os cães ou gatos são tratados por um número adequado de cuidadores de animais e de modo a satisfazer as necessidades de bem-estar dos cães ou gatos mantidos nos seus estabelecimentos e que têm as competências exigidas no artigo 9.º.\n\n2a. Os operadores devem assegurar o bem-estar dos cães ou gatos sob a sua responsabilidade através da monitorização de indicadores baseados no comportamento e aparência física, e através da adoção de ações com base nos resultados de tal monitorização.\n\n2b. A Comissão tem competência para adotar atos delegados em conformidade com o artigo 23.º que complementem este Regulamento através do estabelecimento de indicadores baseados no bem-estar dos animais relativos ao comportamento e aparência física e dos métodos da sua medição."
    },

    "tema": "Alimentação e Hidratação",
    "regulamento": {
      "ref": "Art.º 11.º do Regulamento 2023/0447",
      "titulo": "Feeding and watering",
      "texto": "1. Operators shall ensure that dogs or cats are fed in accordance with the requirements laid down in point 1 of Annex I.\n\n2. Operators shall ensure that dogs or cats are adequately fed and hydrated by supplying:\na) clean and fresh water, ad libitum;\nb) feed in sufficient quantity and quality to meet the physiological, nutritional and metabolic needs of the dogs and cats, as part of a diet adapted to the age, breed, category, activity level, health and reproductive status of the dogs or cats, with the overall objective of achieving and maintaining good health;\nc) feed free of substances which may cause suffering;\nd) feed in such a way as to avoid abrupt changes and ensure a well-functioning gastro-intestinal system, in particular during the weaning phase.\n\n3. Operators shall ensure that feeding and watering facilities are kept clean and are constructed and installed in such a way as to:\na) provide equal access to adequate amounts of feed and water for all dogs or cats and minimise competition between them;\nb) minimise spillage and prevent the contamination of feed and water with harmful physical, chemical or biological contaminants;\nc) prevent injury, drowning or other harm to the dogs or cats;\nd) be easily cleaned and disinfected to prevent the spread of diseases.\n\n3a. Where advised in writing by a veterinarian to do so, the operators may adjust the feeding and watering frequencies for an individual dog or cat. The operators shall keep a record of the advice for its entire duration as advised by the veterinarian.",

  {
    "id": "ART-12",
    "tema": "Alojamento (Housing)",
    "regulamento": {
      "ref": "Art.º 12.º do Regulamento 2023/0447",
      "titulo": "Housing",
      "texto": "1. Operators of breeding and selling establishments shall ensure that dogs or cats are provided with housing in accordance with point 2 of the annex I. Operators of shelters shall ensure that dogs or cats are provided with housing in accordance with point 2.2 of the annex I.\n\n2. Operators shall ensure that:\na) the establishments where dogs or cats are kept and the equipment used therein are suitable for the types and the number of dogs or cats, and allow the necessary access to and a thorough inspection of all dogs or cats;\nb) all building components of the establishment, including the flooring, roof, and space divisions, as well as the equipment used for dogs or cats, are constructed and maintained properly, to ensure that they do not pose any risks to the welfare of the dogs or cats.\n(ba) all building components of the establishment, including the flooring, and space divisions, as well as the equipment used for dogs or cats, are kept cleaned to ensure that they do not pose any risks to the welfare of the dogs or cats;\nc) in breeding and selling establishments where dogs or cats are kept indoors, dust, temperature, relative air humidity and gas concentrations are not harmful to dogs or cats and that ventilation is sufficient to avoid overheating;\nd) dogs and cats have enough space to be able to move around freely and to express species-specific behaviour according to their needs with a possibility to withdraw and rest;\n(da) dogs or cats have clean, comfortable and dry resting places, sufficiently large and numerous to ensure that all of them can lie down and rest at the same time in a natural position;\ne) appropriate structures and measures are in place for dogs or cats kept outdoors to protect them from adverse climatic conditions, including to prevent thermal stress, sunburn and frostbite.\n\n3. Operators shall not keep dogs or cats in containers.\n\nBy way of derogation, containers may only be used for the transport, short term isolation of individual dogs or cats and during the participation in shows, exhibitions and competitions, for puppies or kittens with reduced thermoregulation capacity or puppies or kittens together with their mothers, provided that stress is minimised and suffering is avoided and the dogs and cats are able to stand and lie down in a natural position.\n\n4. Operators shall not keep dogs older than 8 weeks exclusively indoors. Such dogs shall have daily access to an outdoor area, or be walked daily, to allow exercise, exploration and socialization. The duration of the daily access to an outdoor area or walk shall be minimum one hour in total. The operator may only derogate from these requirements based on written advice of a veterinarian.\n\n5. When cats are kept in catteries, operators shall design and construct individual enclosures to allow cats to move around freely and to express their natural behaviour.\n\n6. Operators of breeding and selling establishments shall ensure that in indoor areas where dogs or cats are kept, an appropriate thermoneutral zone is maintained taking into account their coat type, age, size, breed, and health.\n\n6a. Operators of breeding and selling establishments shall use, where necessary, heating or cooling systems to maintain good air quality, an appropriate temperature in indoor enclosures at their establishments, and remove excessive moisture.\n\n7. Operators shall ensure that dogs or cats are exposed to light, and are able to stay in the dark for sufficient and uninterrupted periods in order to maintain a normal circadian rhythm.\n\nFor the purposes of the first subparagraph, 'light' means natural light, complemented, where needed, due to the climatic conditions and geographic position of a Member State, by artificial light.\n\n7a. Paragraphs 2(a), (b), (ba) (da) (e), 6, 6a and 7 shall not apply to livestock guardian dogs, nor to herding dogs, during the periods where such dogs are used for guarding or herding in the context of on foot seasonal transhumance.",
      "traducao": "1. Os operadores de estabelecimentos de criação e venda devem assegurar que os cães ou gatos dispõem de alojamento em conformidade com o ponto 2 do Anexo I. Os operadores de abrigos devem assegurar que os cães ou gatos dispõem de alojamento em conformidade com o ponto 2.2 do Anexo I.\n\n2. Os operadores devem assegurar que:\na) os estabelecimentos onde os cães ou gatos são mantidos e o equipamento utilizado são adequados aos tipos e número de cães ou gatos, e permitem o acesso necessário e inspeção minuciosa de todos os cães ou gatos;\nb) todos os componentes de construção do estabelecimento, incluindo o pavimento, telhado e divisões de espaço, bem como o equipamento utilizado para cães ou gatos, são construídos e mantidos adequadamente, para assegurar que não apresentam riscos ao bem-estar dos cães ou gatos.\n(ba) todos os componentes de construção do estabelecimento, incluindo o pavimento e divisões de espaço, bem como o equipamento utilizado para cães ou gatos, são mantidos limpos para assegurar que não apresentam riscos ao bem-estar dos cães ou gatos;\nc) em estabelecimentos de criação e venda onde os cães ou gatos são mantidos no interior, pó, temperatura, humidade relativa do ar e concentrações de gases não são prejudiciais aos cães ou gatos e a ventilação é suficiente para evitar sobreaquecimento;\nd) os cães e gatos têm espaço suficiente para se moverem livremente e expressar comportamento específico da espécie de acordo com as suas necessidades com possibilidade de se retirarem e descansarem;\n(da) os cães ou gatos têm lugares de repouso limpos, confortáveis e secos, suficientemente grandes e numerosos para assegurar que todos podem deitar-se e descansar ao mesmo tempo numa posição natural;\ne) estruturas e medidas apropriadas estão em vigor para cães ou gatos mantidos no exterior para os proteger de condições climáticas adversas, incluindo para evitar stress térmico, queimaduras solares e frieiras.\n\n3. Os operadores não devem manter cães ou gatos em contentores.\n\nA título de derrogação, contentores podem ser usados apenas para transporte, isolamento a curto prazo de cães ou gatos individuais e durante participação em espetáculos, exposições e competições, para cachorros ou gatinhos com capacidade termorreguladora reduzida ou cachorros ou gatinhos juntamente com as suas mães, desde que o stress seja minimizado e o sofrimento seja evitado e os cães e gatos sejam capazes de se manter em pé e deitar-se numa posição natural.\n\n4. Os operadores não devem manter cães com mais de 8 semanas exclusivamente no interior. Tais cães devem ter acesso diário a uma área ao ar livre, ou ser passeados diariamente, para permitir exercício, exploração e socialização. A duração do acesso diário a uma área ao ar livre ou passeio deve ser mínimo uma hora no total. O operador pode apenas derrogar destes requisitos com base em aconselhamento escrito de um médico veterinário.\n\n5. Quando gatos são mantidos em gatarias, os operadores devem desenhar e construir compartimentos individuais para permitir aos gatos mover-se livremente e expressar o seu comportamento natural.\n\n6. Os operadores de estabelecimentos de criação e venda devem assegurar que em áreas interiores onde os cães ou gatos são mantidos, uma zona termoneural apropriada é mantida levando em conta o seu tipo de pelagem, idade, tamanho, raça e saúde.\n\n6a. Os operadores de estabelecimentos de criação e venda devem usar, quando necessário, sistemas de aquecimento ou arrefecimento para manter boa qualidade do ar, uma temperatura apropriada em compartimentos interiores nos seus estabelecimentos, e remover humidade excessiva.\n\n7. Os operadores devem assegurar que os cães ou gatos são expostos à luz, e são capazes de permanecer no escuro por períodos suficientes e ininterruptos para manter um ritmo circadiano normal.\n\nPara efeitos do primeiro parágrafo, 'luz' significa luz natural, complementada, quando necessário, devido às condições climáticas e posição geográfica de um Estado-Membro, por luz artificial.\n\n7a. Os parágrafos 2(a), (b), (ba) (da) (e), 6, 6a e 7 não se aplicam a cães guardiões de gado, nem a cães de pastoreio, durante os períodos em que tais cães são utilizados para guarda ou pastoreio no contexto de transumância sazonal a pé."

      "texto": "1. Operators shall ensure that:\n\n(a) dogs or cats under their responsibility are inspected by animal caretakers at least once a day and vulnerable dogs and cats, such as newborns, ill or injured dogs and cats, and peri-partum bitches and queens, are inspected more frequently;\n(b) dogs or cats with compromised welfare are, where necessary, transferred without undue delay to a separate area and, where needed, receive appropriate treatment;\n(c) where the recovery of a dog or a cat with compromised welfare is not achievable and the dog or cat experiences severe pain or suffering, a veterinarian is consulted without undue delay, to decide whether the dog or cat shall be euthanised to end its suffering, and, if that is the case, to perform the euthanasia using anesthesia and analgesia;\n(d) measures to prevent and control external and internal parasites, and vaccinations to prevent common diseases to which dogs or cats are likely to be exposed are implemented;\n(e) enrichment do not present a significant risk of injury or biological or chemical contamination or any other health risk.\n\nPoint (a) shall not apply to livestock guardian dogs kept in breeding establishments during the periods when such dogs are used for guarding or training purposes.\n\nMember states may grant derogations from point (c) in cases of emergencies, where no veterinarian can be reached without undue delay, provided that national rules are put in place to ensure that:\n(i) an immediate action ending the life of the dog or cat with minimum pain and suffering using a method inducing instant death is undertaken by a trained competent person;\n(ii) the operator keeps a record of the use of the derogation for purposes of the official control.\n\n2. Operators of breeding establishments shall additionally ensure that:\n\n(-a) measures are taken to safeguard the health of dogs or cats in accordance with point 3 of Annex I;\n(-b) bitches or queens are only bred if they have reached a minimum age and skeletal maturity in accordance with point 3 of Annex I, and they have no diagnosed disease, clinical sign of diseases or physical conditions which could negatively impact their pregnancy and welfare;\n(-c) litter-giving pregnancies of bitches or queens follows a maximum frequency in accordance with point 3 of Annex I;\n(-d) lactating queens are not mated or inseminated;\n(-e) dogs and cats which are no longer used for reproduction, including as a result of the provisions of this Regulation, are either kept or sold, donated or rehomed, not killed or abandoned.",

ão devem adicionalmente assegurar que:\n\n(-a) são tomadas medidas para salvaguardar a saúde dos cães ou gatos em conformidade com o ponto 3 do Anexo I;\n(-b) as cadelas ou gatas só são reproduzidas se tiverem atingido a idade mínima e a maturidade esquelética em conformidade com o ponto 3 do Anexo I, e não apresentem doença diagnosticada, sinais clínicos de doença ou condições físicas que possam impactar negativamente a gestação e o seu bem-estar;\n(-c) a frequência de gestações com ninhadas de cadelas ou gatas respeita a frequência máxima fixada no ponto 3 do Anexo I;\n(-d) as gatas a lactar não são acasaladas nem inseminadas;\n(-e) os cães e gatos que deixem de ser utilizados para reprodução, nomeadamente em resultado das disposições do presente Regulamento, são mantidos ou vendidos, doados ou realojados, não sendo mortos nem abandonados."

      "texto": "1. Operators shall ensure that measures are taken to meet the behavioural needs of dogs or cats in accordance with point 4 of Annex I.\n\n2. Operators shall not keep dogs or cats in areas restraining their natural movements, except in case of Article 12(3), second sub-paragraph, or for performing the following procedures or treatments:\na) physical examinations;\nb) individual identification of dogs or cats and reading the identification information;\nc) collection of samples and vaccinations;\nd) procedures for grooming, hygienic, health or reproductive purposes other than mating;\ne) medical treatment, including surgical treatment or prescribed rehabilitation.\n\n3. Tethering for more than 1 hour shall be prohibited, except for the duration of a medical treatment or participation in shows, exhibitions and competitions of dogs and cats.\n\n3a. Member States may grant derogations from paragraph 3 for dogs intended for use in military, police and customs services that are kept in breeding or selling establishments.\n\n4. Operators shall ensure that conditions are in place to allow dogs or cats to express social non-harmful behaviours, species-specific behaviours and the possibility to experience positive emotions.\n\n5. Operators shall ensure that dogs or cats can socialise in accordance with point 4 of Annex I. Operators of breeding establishments shall document their strategy for such socialisation.\n\n5a. The first subparagraph shall not apply to livestock guardian dogs kept in breeding establishments during the periods when such dogs are used for guarding or training purposes nor to herding dogs during seasonal transhumance.\n\n6. Operators shall ensure that enrichment is provided and accessible to all dogs or cats, creating a stimulating environment, enabling species-specific behaviour and reducing their frustration.",

      "titulo": "Painful practices",
      "texto": "1. Operators shall ensure that mutilations, including ear cropping, tail docking, claw removal or other partial or complete digit amputation, and resection of vocal cords or folds, are not performed unless upon medical indication, which may include prophylactic, with the sole purpose of preserving, improving the health of dogs or cats or preventing injury. In such case, the procedure shall only be performed under anaesthesia and prolonged analgesia and by a veterinarian.\n\n1a. The medical indication for the mutilation and the details of procedure carried out shall be documented by a veterinarian. This document shall be retained by the operator until the dog or cat, together with this document, is transferred to another establishment or owner. The operator of the establishment where the mutilation was performed shall retain a copy of the document for three years after the transfer of the dog or cat.\n\n1b. By way of derogation from paragraph 1, Member States may allow ear cropping by notching or tipping cat ears in the context of marking stray cats when neutered under a trap-neuter-return programme.\n\n2. Operators shall ensure that neutering is only performed under anaesthesia and prolonged analgesia and by a veterinarian. By way of derogation, Member States may allow that the neutering of male cats is performed by a licensed veterinary nurse.\n\n3. Operators shall ensure that handling practices that cause pain or suffering are not performed, including:\na) tying up body parts unless for medical reasons in which case the duration shall be limited to the minimum period necessary;\nb) kicking, hitting, dragging, throwing, squeezing dogs or cats;\nc) applying electric current to dogs or cats unless performed for medical reasons;\nd) using of muzzles, unless required for medical reasons, animal or human safety reasons, in which case the duration shall be limited to the minimum period necessary and the dog or cat shall be supervised.\n(da) using prong collars;\n(db) using choke collars without safety stop;\ne) lifting dogs or cats by the limbs, head, ears, tail or hair, or lifting adult dogs or cats by the skin.\n\n4. Member States may grant derogations from paragraph 3 for dogs intended for use in military, police or customs services.",
      "traducao": "1. Os operadores devem assegurar que mutilações, incluindo corte de orelhas, corte de cauda, remoção de garras ou amputação parcial ou completa de dígitos, e ressecção de cordas vocais ou pregas, não são realizadas a menos que por indicação médica, que pode incluir profilática, com o único propósito de preservar, melhorar a saúde de cães ou gatos ou prevenir ferimentos. Nesse caso, o procedimento deve ser realizado apenas sob anestesia e analgesia prolongada e por um médico veterinário.\n\n1a. A indicação médica para a mutilação e os detalhes do procedimento realizado devem ser documentados por um médico veterinário. Este documento deve ser retido pelo operador até que o cão ou gato, juntamente com este documento, seja transferido para outro estabelecimento ou proprietário. O operador do estabelecimento onde a mutilação foi realizada deve reter uma cópia do documento durante três anos após a transferência do cão ou gato.\n\n1b. A título de derrogação do parágrafo 1, os Estados-Membros podem permitir o corte de orelhas por entalhe ou ponta das orelhas de gatos no contexto de marcação de gatos vadios quando esterilizados sob um programa de captura-esterilização-libertação.\n\n2. Os operadores devem assegurar que a esterilização é realizada apenas sob anestesia e analgesia prolongada e por um médico veterinário. A título de derrogação, os Estados-Membros podem permitir que a esterilização de gatos machos seja realizada por um enfermeiro veterinário licenciado.\n\n3. Os operadores devem assegurar que práticas de manipulação que causam dor ou sofrimento não são realizadas, incluindo:\na) amarrar partes do corpo a menos que por razões médicas em cujo caso a duração deve ser limitada ao período mínimo necessário;\nb) chutar, bater, arrastar, atirar, apertar cães ou gatos;\nc) aplicar corrente elétrica a cães ou gatos a menos que realizado por razões médicas;\nd) uso de focinheiras, a menos que necessário por razões médicas, segurança animal ou humana, em cujo caso a duração deve ser limitada ao período mínimo necessário e o cão ou gato deve ser supervisionado.\n(da) uso de colares de espinhos;\n(db) uso de colares de estrangulamento sem paragem de segurança;\ne) levantar cães ou gatos pelas extremidades, cabeça, orelhas, cauda ou pêlo, ou levantar cães ou gatos adultos pela pele.\n\n4. Os Estados-Membros podem conceder derrogações do parágrafo 3 para cães destinados a uso em serviços militares, policiais ou aduaneiros."

      "texto": "1. All dogs and cats kept in establishments placed on the market or owned by pet owners or by any other natural or legal persons, shall be individually identified by means of a single injectable transponder containing a readable microchip compliant with Annex II.\n\n1a. Operators shall ensure that dogs and cats born in their establishments are individually identified within 3 months after their birth and in any event before the date of their placing on the market.\n\nOperators of selling establishments, shelters and those placing and being responsible for dogs and cats in foster homes shall ensure that dogs and cats that enter their establishments or come under their responsibility are individually identified within 30 days after their arrival at the establishment and in any event before the date of their placing on the market.\n\nPet owners and any other natural or legal persons, other than operators, who own dogs or cats, shall ensure that the dogs or cats are individually identified at the latest when the dog or cat reaches 3 months of age or, in case the dog or cat is placed on the market, before the date of their placing on the market.\n\n2. The implantation of the transponder shall be performed by a veterinarian. Member States may allow the implantation of transponders in cats to be performed by a person other than a veterinarian, if it is done under the responsibility of a veterinarian.\n\n3. Dogs and cats which have been individually identified by means of an injectable transponder containing a microchip, in accordance with national legislation prior to entry into force of this Regulation, shall be recognised as identified in accordance with the requirements of this Article.\n\n4. Within two working days after their identification, the dogs and cats shall be registered by a veterinarian in a national database.\n\n5. For dogs and cats kept in establishments, the registration shall be made in the name of the operator of the establishment. For dogs and cats placed in foster homes, the registration shall be made in the name of the person responsible for the foster home. For dogs and cats owned by pet owners or by any other natural or legal person, the registration shall be made in the name of the pet owner or the natural or legal person.\n\nMember States may grant derogations from the first subparagraph to military, police and customs dogs.\n\n6. In case of placing on the market or occasional and irregular donation by a natural person without online advertising, the requirements for registration shall not apply.\n\n7. In the case of a death of a dog or a cat, the operator, pet owner or natural or legal person owning the dog or cat shall inform the national database.\n\n8. In case of unreadable transponder, the operator or the natural or legal person responsible for the dog or cat shall ensure that the dog or cat is re-identified with a new transponder and re-registered in the national database.",

operador do estabelecimento. Para cães e gatos colocados em famílias de acolhimento, o registo deve ser efetuado em nome da pessoa responsável pela família de acolhimento. Para cães e gatos detidos por donos de animais de companhia ou por qualquer outra pessoa singular ou coletiva, o registo deve ser efetuado em nome do dono ou da pessoa singular ou coletiva.\n\nOs Estados-Membros podem conceder derrogações ao primeiro parágrafo a cães militares, policiais e aduaneiros.\n\n6. Em caso de colocação no mercado ou cedência ocasional e irregular por pessoa singular sem publicidade em linha, os requisitos de registo não se aplicam.\n\n7. Em caso de morte de um cão ou gato, o operador, dono do animal ou pessoa singular ou coletiva proprietária devem informar a base de dados nacional.\n\n8. Em caso de transponder ilegível, o operador ou a pessoa singular ou coletiva responsável pelo cão ou gato devem assegurar que o animal é reidentificado com um novo transponder e re-registado na base de dados nacional."

oken referred to in Article 17a(3)(c).\n\nc) in case of Article 19(1), and Article 19(2a), 25 years after the first registration of the dog or cat in the database referred to in that Article or 5 years after the recording of the death of the dog or cat in that database;\n\nd) in case of the third subparagraph of Article 21(4a), 5 years after the date of pre-notification.",

 condições estabelecidas no artigo 17.º, parágrafo 1, alínea a), do Regulamento Delegado (C(2026) 20); e\n— cães ou gatos registados numa base de dados de um Estado-Membro referida no artigo 19.º, parágrafo 1.\n\nSe o cão ou gato permanecer mais de seis meses na União, o proprietário deve assegurar o seu registo por um médico veterinário na base de dados do Estado-Membro de residência referida no artigo 19.º, parágrafo 1, no prazo de 5 dias úteis após o termo do sexto mês. Os Estados-Membros podem permitir o registo por outras pessoas que não médicos veterinários, desde que tenham medidas em vigor para assegurar a exatidão das informações inseridas na base de dados."

      "texto": "1 — The power to adopt delegated acts is conferred on the Commission subject to the conditions laid down in this Article.\n\n2 — The power to adopt delegated acts referred to in Article 6(2b), Article 6a(3), Article 10(2) and Article 22 shall be conferred on the Commission for an indeterminate period of time from [the date of entry into force of this Regulation].\n\n3 — The delegation of power referred to in Article 6(2b), Article 6a(3), Article 10(2) and Article 22 may be revoked at any time by the European Parliament or by the Council. A decision to revoke shall put an end to the delegation of the power specified in that decision. It shall take effect the day following the publication of the decision in the Official Journal of the European Union or at a later date specified therein. It shall not affect the validity of any delegated acts already in force.\n\n4 — Before adopting a delegated act, the Commission shall consult experts designated by each Member State in accordance with the principles laid down in the Interinstitutional Agreement of 13 April 2016 on Better Law-Making.\n\n5 — As soon as it adopts a delegated act, the Commission shall notify it simultaneously to the European Parliament and to the Council.\n\n6 — A delegated act adopted pursuant to Article 6(2b), Article 6a(3), Article 10(2) and Article 22 shall enter into force only if no objection has been expressed either by the European Parliament or by the Council within a period of two months of notification of that act to the European Parliament and the Council or if, before the expiry of that period, the European Parliament and the Council have both informed the Commission that they will not object. That period shall be extended by two months at the initiative of the European Parliament or of the Council.",

    "id": "ANNEX-I-NUMERO-1",
    "tema": "Requisitos Técnicos — Alimentação e Abeberamento",
    "regulamento": {
      "ref": "ANEXO I, Ponto 1 do Regulamento 2023/0447",
      "titulo": "Feeding and watering",
      "texto": "1. Feeding and watering\n\n1.1 Dogs and cats shall be fed at least twice per day. Puppies and kittens shall be fed more frequently.\n\n1.2 These requirements shall not apply to livestock guardian dogs kept in breeding establishments during the periods when such dogs are used for guarding or training purposes.\n\n1.3 Each puppy or kitten shall be fed with colostrum during at least the first two days of its life and thereafter with milk from its mother or a lactating bitch or queen. If this is not possible, because she is ill or is otherwise unable to feed her offspring or not sufficient, the puppy or kitten shall be fed with a milk replacer designed for puppies and kittens with such feeding frequency as instructed by the producer of the replacer or by a veterinarian.\n\n1.4 All unweaned puppies and kittens shall be fed enough milk, milk replacer or a combination thereof to steadily gain bodyweight.\n\n1.5 Weaning shall be performed with gradual introduction of firm feed, in a process not shorter than 7 days and shall not be completed before 6 weeks of age for puppies and kittens alike.",
      "traducao": "1. Alimentação e abeberamento\n\n1.1 Os cães e gatos devem ser alimentados pelo menos duas vezes por dia. Os filhotes de cão e gato devem ser alimentados com maior frequência.\n\n1.2 Estes requisitos não se aplicam aos cães pastores de gado mantidos em estabelecimentos de criação durante os períodos em que tais cães são utilizados para guarda ou treino.\n\n1.3 Cada filhote de cão ou gato deve ser alimentado com colostro durante pelo menos os primeiros dois dias de vida e depois com leite da mãe ou de uma cadela ou gata lactante. Se tal não for possível, porque está doente ou incapaz de alimentar a ninhada ou se o leite for insuficiente, o filhote deve ser alimentado com um substituto de leite concebido para filhotes, com a frequência de alimentação instruída pelo produtor do substituto ou por um veterinário.\n\n1.4 Todos os filhotes de cão e gato ainda em aleitamento devem ser alimentados com leite, substituto de leite ou uma combinação dos dois, em quantidade suficiente para ganhar peso corporal de forma constante.\n\n1.5 O desmame deve ser realizado com introdução gradual de alimentos sólidos, num processo que não seja inferior a 7 dias e não deve ser concluído antes dos 6 semanas de idade para filhotes de cão e gato."

      "texto": "Artigo 33.º - Alimentação\n\n1 - Deve existir um programa de alimentação bem definido, de valor nutritivo adequado e distribuído em quantidade suficiente para satisfazer as necessidades fisiológicas, nutricionais e metabólicas dos cães e gatos, consoante a edad, raça, categoria, nível de atividade e estado de saúde.\n\n2 - Os animais devem receber alimentos saudáveis, adequados e convenientes ao seu normal desenvolvimento e acesso permanente a água potável.\n\n3 - As refeições devem ser variadas, sendo distribuídas segundo a rotina que mais se adequar à espécie.\n\n4 - Os alimentos devem ser preparados e armazenados de acordo com padrões estritos de higiene, em locais secos, limpos, livres de agentes patogénicos e de produtos tóxicos.\n\n5 – Sempre que se justifique, devem existir aparelhos de frio para uma eficiente conservação dos alimentos.\n\n6 - Os animais devem dispor de água potável e sem qualquer restrição, salvo por razões médico-veterinárias."

    "codigo": {
      "ref": "Art.º 18.º (n.º 1), Art.º 46.º do Código do Animal (DL 214/2013)",
      "texto": "Artigo 18.º - Instalações\n\nn.º 1 - Os alojamentos que se destinem à reprodução, criação, manutenção ou venda de animais de companhia, devem possuir instalações individualizadas destinadas à armazenagem de alimentos e equipamento limpo e à lavagem e recolha de material.\n\nArtigo 46.º - Alimentação e abeberamento\n\nn.º 1 - A alimentação dos animais de companhia, nos locais de criação, manutenção e venda bem como nos centros de recolha e instalações de hospedagem, deve obedecer a um programa de alimentação bem definido, de valor nutritivo adequado e distribuído em quantidade suficiente para satisfazer as necessidades alimentares das espécies e dos indivíduos, de acordo com a fase de evolução fisiológica em que se encontram, nomeadamente idade, sexo, fêmeas prenhes ou em fase de lactação.\n\nn.º 2 - As refeições devem ainda ser variadas, sendo distribuídas segundo a rotina que mais se adequar à espécie.\n\nn.º 3 - O número, formato e distribuição de comedouros e bebedouros deve ser tal que permita aos animais satisfazerem as suas necessidades sem que haja competição excessiva dentro do grupo.\n\nn.º 4 - Os alimentos devem ser preparados e armazenados de acordo com padrões estritos de higiene, em locais secos, limpos, livres de agentes patogénicos e de produtos tóxicos e, no caso dos alimentos compostos devem, ainda, ser armazenados sobre estrados de madeira ou prateleiras.\n\nn.º 5 - Devem existir aparelhos de frio para uma eficiente conservação dos alimentos.\n\nn.º 6 - Os animais devem dispor de água potável e sem qualquer restrição, salvo por razões médico-veterinárias.\n\nn.º 7 - É proibido alimentar animais com restos de comida, produtos de pastelaria e desperdícios da indústria alimentar e de restauração."

let atual = 0;
let searchTerm = '';

/* ---- PESQUISA ---- */
function pesquisar(q) {
  searchTerm = q.trim().toLowerCase();
  const clearBtn = document.getElementById('clear-btn');
  if (clearBtn) clearBtn.style.display = searchTerm ? 'block' : 'none';
  if (searchTerm) {
    const primeiroIdx = ARTIGOS.findIndex(a => artMatch(a, searchTerm));
    if (primeiroIdx >= 0 && !artMatch(ARTIGOS[atual], searchTerm)) {
      atual = primeiroIdx;
    }
  }
  render();
}

function limparPesquisa() {
  searchTerm = '';
  const inp = document.getElementById('search-input');
  if (inp) inp.value = '';
  const clearBtn = document.getElementById('clear-btn');
  if (clearBtn) clearBtn.style.display = 'none';
  render();
}

function artMatch(art, q) {
  const div = art.divergencia || {};
  const campos = [
    art.id, art.tema,
    art.regulamento.ref, art.regulamento.titulo,
    art.regulamento.texto, art.regulamento.traducao,
    art.rgbeac.ref, art.rgbeac.texto,
    art.codigo.ref, art.codigo.texto,
    art.legislacao.ref, art.legislacao.texto,
    div.legislacao, div.codigo, div.rgbeac, div.sumario
  ];
  return campos.some(c => (c || '').toLowerCase().includes(q));
}

function getSnippet(art, q) {
  const div = art.divergencia || {};
  const campos = [
    art.regulamento.traducao, art.regulamento.texto,
    art.rgbeac.texto, art.codigo.texto,
    art.legislacao.texto,
    div.legislacao, div.codigo, div.rgbeac, div.sumario
  ];
  for (const c of campos) {
    const idx = (c || '').toLowerCase().indexOf(q);
    if (idx >= 0) {
      const s = Math.max(0, idx - 28);
      const e = Math.min(c.length, idx + q.length + 40);
      return (s > 0 ? '…' : '') +
             c.slice(s, e).replace(/\n/g, ' ') +
             (e < c.length ? '…' : '');
    }
  }
  return '';
}

function highlight(str) {
  if (!searchTerm || !str) return nl2br(str || '');
  const re = new RegExp(searchTerm.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'), 'gi');
  return nl2br(str.replace(re, m => `<mark>${m}</mark>`));
}

/* Formata texto legal com deteção automática de alíneas e subalíneas */
function hl(s) {
  if (!searchTerm || !s) return s || '';
  const re = new RegExp(searchTerm.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'), 'gi');
  return s.replace(re, m => `<mark>${m}</mark>`);
}

function formatarTexto(str) {
  if (!str) return '';
  const blocos = str.split(/\n\n+/);
  return blocos.map(bloco => {
    const isDim = bloco.startsWith('[dim]');
    const blockText = isDim ? bloco.slice(5) : bloco;
    const dimCls = isDim ? ' leg-dim' : '';
    const linhas = blockText.split('\n').filter(l => l.trim() !== '');
    if (!linhas.length) return '';
    const ps = linhas.map(linha => {
      const t = linha.trim();
      if (/^Artigo\s+\d+/i.test(t)) {
        return `<p class="leg-art-header">${hl(t)}</p>`;
      }
      if (/^[—–]\s/.test(t) || t === '—' || t === '–') {
        return `<p class="leg-sub">${hl(t)}</p>`;
      }
      if (/^[a-z]\)/.test(t) || /^\([a-z-]+\)/.test(t)) {
        return `<p class="leg-alinea">${hl(t)}</p>`;
      }
      return `<p class="leg-p">${hl(t)}</p>`;
    }).join('');
    return `<div class="leg-block${dimCls}">${ps}</div>`;
  }).join('');
}

function renderDiv(div) {
  if (!div) return '';
  const secs = [
    { cls: 'tag-leg', label: '@legislacao',  texto: div.legislacao },
    { cls: 'tag-cod', label: '@codigo',      texto: div.codigo },
    { cls: 'tag-rgb', label: '@rgbeac',      texto: div.rgbeac },
    { cls: 'tag-sum', label: 'Sumário',      texto: div.sumario },
  ];
  return secs.map(s => `
    <div class="div-section">
      <span class="div-tag ${s.cls}">${s.label}</span>
      <span class="div-text">${hl(s.texto)}</span>
    </div>`).join('');
}

/* ---- SIDEBAR ---- */
function renderSidebar() {
  const nav = document.getElementById('sidebar');
  nav.innerHTML = '<h2>Artigos</h2>';
  let nResultados = 0;
  ARTIGOS.forEach((art, i) => {
    const mostrar = !searchTerm || artMatch(art, searchTerm);
    if (!mostrar) return;
    nResultados++;
    const btn = document.createElement('button');
    const snippet = searchTerm ? getSnippet(art, searchTerm) : '';
    btn.innerHTML =
      `<b>${art.id}</b><small>${art.tema}</small>` +
      (snippet ? `<em style="font-size:.7rem;opacity:.65;display:block;margin-top:3px;font-style:normal;">${
        snippet.replace(new RegExp(searchTerm.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'),'gi'),
                        m => `<mark>${m}</mark>`)
      }</em>` : '');
    btn.className = i === atual ? 'active' : '';
    btn.onclick = () => { atual = i; render(); };
    nav.appendChild(btn);
  });
  if (searchTerm) {
    const ct = document.createElement('div');
    ct.className = 'search-count';
    ct.textContent = nResultados > 0
      ? `${nResultados} resultado(s) para "${searchTerm}"`
      : 'Sem resultados.';
    nav.insertBefore(ct, nav.children[1]);
  }
}

/* ---- UTILIDADES ---- */
function nl2br(str) {
  return (str || '').replace(/\n/g, '<br>');
}

function render() {
  const art = ARTIGOS[atual];
  renderSidebar();
  document.getElementById('progresso').textContent =
    `${atual + 1} / ${ARTIGOS.length}`;

  document.getElementById('main-content').innerHTML = `
    <div class="art-badge">${art.id}</div>
    <div class="tema-title">${art.tema}</div>

    <div class="card reg" style="margin-bottom:14px;">
      <div class="card-header">
        @regulamento — ${art.regulamento.titulo}
        <span class="card-header-ref">${art.regulamento.ref} · Texto original EN</span>
      </div>
      <div class="card-body">
        ${formatarTexto(art.regulamento.texto)}
      </div>
    </div>

    <div class="card reg-tr" style="margin-bottom:20px;">
      <div class="card-header">
        @regulamento — Tradução PT-PT
        <span class="card-header-ref">${art.regulamento.ref}</span>
      </div>
      <div class="card-body">
        ${formatarTexto(art.regulamento.traducao)}
      </div>
    </div>

    <div class="grid">
      <div class="card rgb">
        <div class="card-header">@rgbeac (proposta jun. 2025)</div>
        <div class="card-body">
          <div class="card-ref">${art.rgbeac.ref}</div>
          ${formatarTexto(art.rgbeac.texto)}
        </div>
      </div>
      <div class="card cod">
        <div class="card-header">@codigo (DL n.º 214/2013)</div>
        <div class="card-body">
          <div class="card-ref">${art.codigo.ref}</div>
          ${formatarTexto(art.codigo.texto)}
        </div>
      </div>
      <div class="card leg">
        <div class="card-header">@legislacao (legislação vigente)</div>
        <div class="card-body">
          <div class="card-ref">${art.legislacao.ref}</div>
          ${formatarTexto(art.legislacao.texto)}
        </div>
      </div>
    </div>

    <div class="div-box">
      <strong>Divergência face ao Regulamento
        <span class="badge-alt">Necessidade de alteração: ${art.necessidade_alteracao}</span>
      </strong>
      ${renderDiv(art.divergencia)}
    </div>

    <div class="notas-box">
      <label>Notas de Reunião</label>
      <textarea id="notas-input" placeholder="Escreve aqui as decisões ou observações da reunião..."
        oninput="ARTIGOS[${atual}].notas = this.value">${art.notas}</textarea>
    </div>

    <div class="nav-btns">
      ${atual > 0 ? '<button class="btn btn-prev" onclick="navegar(-1)">← Anterior</button>' : ''}
      <button class="btn btn-export" onclick="exportarNotas()">Exportar Notas (CSV)</button>
      ${atual < ARTIGOS.length - 1 ? '<button class="btn btn-next" onclick="navegar(1)">Próximo →</button>' : ''}
    </div>
    <div id="export-msg"></div>
  `;
}

function navegar(dir) {
  atual = Math.max(0, Math.min(ARTIGOS.length - 1, atual + dir));
  render();
  window.scrollTo({top: 0, behavior: 'smooth'});
}

function exportarNotas() {
  const linhas = [['ID', 'Tema', 'Art. Regulamento', 'Art. RGBEAC', 'Art. Código',
                   'Art. Legislação Vigente', 'Div. @legislacao', 'Div. @codigo',
                   'Div. @rgbeac', 'Sumário', 'Necessidade Alteração', 'Notas de Reunião']];
  ARTIGOS.forEach(a => {
    const d = a.divergencia || {};
    linhas.push([
      a.id, a.tema,
      a.regulamento.ref, a.rgbeac.ref, a.codigo.ref,
      a.legislacao.ref,
      d.legislacao || '', d.codigo || '', d.rgbeac || '', d.sumario || '',
      a.necessidade_alteracao,
      a.notas
    ]);
  });
  const csv = linhas.map(r => r.map(c => `"${String(c).replace(/"/g,'""')}"`).join(',')).join('\n');
  const blob = new Blob([csv], {type: 'text/csv;charset=utf-8;'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'notas_reuniao_regulamento.csv';
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  const msg = document.getElementById('export-msg');
  if (msg) { msg.style.display = 'block'; msg.textContent = 'CSV exportado com as notas da reunião.'; }
}

// Iniciar
render();
