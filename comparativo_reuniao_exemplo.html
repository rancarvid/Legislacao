      "titulo": "Health",
      "texto": "3. Health\n1.1 Queens shall only be bred if their age is at least 10 months.\n2.2 Bitches shall only be bred as of their second oestrus.\n3.3 A bitch or queen shall not deliver more than 3 litters within a period of 2 years.\n4.4 For bitches and queens that have delivered 3 litters, including stillborns within a period of 2 years, there shall be a recuperation period of at least 1 year.\n5.5 Any bitch or queen that underwent two cesarean sections shall not be used for breeding.\n6.6 Before any bitch aged 8 years or more and any queen aged 6 years or more, is used for breeding, it must have been physically examined by a veterinarian who confirms in writing that, at the time of the examination, there are no counter-indications to pregnancy.\nThe operator shall keep the written confirmation referred to in point 3.4.b for a period of at least 3 years.",

      "texto": "3. Behavioural needs\n1.1 Socialisation\nFrom three weeks of age, dogs and cats shall be gradually provided with daily opportunities for social contact with their conspecifics and humans, and, where possible, with other animal species.\nDogs and cats that pose a threat to each other due to aggressive behaviour or cause each other undue stress or discomfort shall be kept separate.\n2.2 Enrichment\nWhere cats are kept, there shall be a sufficient number of scratching posts, hiding places and shelves to ensure that each cat can climb, rest, observe and withdraw.\n3.3 Separation\nPuppies kept in establishments shall not be permanently separated from their mothers before the age of 8 weeks.\nKittens kept in shelters and foster homes shall not be permanently separated from their mothers before the age of 8 weeks. Kittens kept in breeding establishments shall not be permanently separated from their mothers before the age of 12 weeks.\nBy way of derogation, earlier separation shall be possible due to medical reasons based on written advice of a veterinarian. The operator shall keep a record of the advice until the last puppy or kitten of the litter concerned is placed on the market.",
      "traducao": "Bem-Estar Comportamental\n1.1 Socialização\nA partir das três semanas de idade, cães e gatos devem ser gradualmente fornecidos com oportunidades diárias de contato social com seus congêneres e humanos, e, sempre que possível, com outras espécies animais.\nCães e gatos que representam uma ameaça um ao outro devido a comportamento agressivo ou causam um ao outro stress excessivo ou desconforto devem ser mantidos separados.\n2.2 Enriquecimento\nOnde gatos são mantidos, deve haver um número suficiente de postes de arranhadura, locais de abrigo e prateleiras para garantir que cada gato pode subir, descansar, observar e retirar-se.\n3.3 Separação\nCachorros mantidos em estabelecimentos não devem ser permanentemente separados das suas mães antes das 8 semanas de idade.\nGatinhos mantidos em abrigos e casas de acolhimento não devem ser permanentemente separados das suas mães antes das 8 semanas de idade. Gatinhos mantidos em estabelecimentos de criação não devem ser permanentemente separados das suas mães antes das 12 semanas de idade.\nPor derrogação, separação anterior é possível por razões médicas com base em parecer escrito de um veterinário. O operador deve conservar o parecer até o último cachorro ou gatinho da ninhada em questão ser colocado no mercado."

      "titulo": "Identification and registration of dogs and cats",
      "texto": "Identification and registration of dogs and cats\nTransponders used to individually identify dogs and cats as required in Article 20 and Article 26 shall meet the following requirements:\n(a) the microchip shall contain an individual, non-repeatable and non-reprogrammable identification number;\n(b) the identification number shall start with the country of identification of the dog or cat identified in accordance with ISO standard 3166;\n(c) the code structure and technical concept of the radio frequency identification shall be in compliance with ISO standards 11784 and 11785;\n(d) compliance with ISO standards 11784 and 11785 shall be evaluated in accordance with ISO standard 24631-1.",
      "traducao": "Identificação e registo de cães e gatos\nOs transponders utilizados para identificar individualmente cães e gatos, tal como exigido nos artigos 20.º e 26.º, devem cumprir os seguintes requisitos:\n(a) O microchip deve conter um número de identificação individual, não repetível e não reprogramável;\n(b) O número de identificação deve começar pelo país de identificação do cão ou gato, identificado em conformidade com a norma ISO 3166;\n(c) A estrutura do código e o conceito técnico da identificação por radiofrequência devem estar em conformidade com as normas ISO 11784 e 11785;\n(d) a conformidade com as normas ISO 11784 e 11785 deve ser avaliada de acordo com a norma ISO 24631-1"
    },

// ── GLOSSÁRIO INTERATIVO: Tooltips e Marcação de Termos (APENAS REGULAMENTO) ──
let tooltipTimeoutId = null;

function marcarGlossario(htmlStr, glossario) {
  if (!glossario || Object.keys(glossario).length === 0) return htmlStr;

  let result = htmlStr;
  for (const termo of Object.keys(glossario)) {
    // Escapar caracteres especiais de regex
    const regexEscaped = termo.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
    const regex = new RegExp('\\b' + regexEscaped + '\\b(?![^<]*>)', 'gi');
    result = result.replace(regex, m => '<span class="glossario-termo" data-termo="' + termo + '">' + m + '</span>');
  }
  return result;
}

function mostrarTooltip(termo, elemento, glossario) {
  const tooltip = document.getElementById('tooltip-glossario');
  const definicao = glossario[termo.toLowerCase()];
  if (!definicao) return;

  tooltip.textContent = definicao;
  tooltip.classList.add('visible');

  const rect = elemento.getBoundingClientRect();
  let top = rect.bottom + 8;
  let left = rect.left;

  tooltip.style.left = Math.max(8, Math.min(left, window.innerWidth - 328)) + 'px';
  tooltip.style.top = top + 'px';

  clearTimeout(tooltipTimeoutId);
  tooltipTimeoutId = setTimeout(() => esconderTooltip(), 6000);
}

function esconderTooltip() {
  const tooltip = document.getElementById('tooltip-glossario');
  tooltip.classList.remove('visible');
}

// Função auxiliar para determinar qual glossário usar
function obterGlossarioParaElemento(elemento) {
  // Verificar o card pai para saber qual glossário usar
  const card = elemento.closest('.card');
  if (card && card.classList.contains('reg')) {
    return GLOSSARIO_EN;  // Texto em inglês
  } else if (card && card.classList.contains('reg-tr')) {
    return GLOSSARIO_PT;  // Tradução em português
  }
  return null;  // Não usar glossário
}

// Event delegation para termos do glossário (APENAS em cards de Regulamento)
document.addEventListener('mouseenter', (e) => {
  if (e.target.classList.contains('glossario-termo')) {
    const glossario = obterGlossarioParaElemento(e.target);
    if (glossario) {
      mostrarTooltip(e.target.dataset.termo, e.target, glossario);
    }
  }
}, true);

document.addEventListener('mouseleave', (e) => {
  if (e.target.classList.contains('glossario-termo')) {
    if (obterGlossarioParaElemento(e.target)) {
      clearTimeout(tooltipTimeoutId);
      tooltipTimeoutId = setTimeout(() => esconderTooltip(), 500);
    }
  }
}, true);

document.addEventListener('click', (e) => {
  if (e.target.classList.contains('glossario-termo')) {
    const glossario = obterGlossarioParaElemento(e.target);
    if (glossario) {
      e.preventDefault();
      mostrarTooltip(e.target.dataset.termo, e.target, glossario);
    }
  }
}, true);


// ── NOTAS: localStorage + JSON export/import ──────────────────────────────
const _STORAGE_KEY = 'notas_reuniao_regulamento';

function _guardarLocal() {
  const notas = {};
  ARTIGOS.forEach(a => { if (a.notas) notas[a.id] = a.notas; });
  localStorage.setItem(_STORAGE_KEY, JSON.stringify(notas));
}

function _carregarLocal() {
  try {
    const raw = localStorage.getItem(_STORAGE_KEY);
    if (!raw) return;
    const notas = JSON.parse(raw);
    ARTIGOS.forEach(a => { if (notas[a.id]) a.notas = notas[a.id]; });
  } catch (_) {}
}

function exportarJSON() {
  const notas = {};
  ARTIGOS.forEach(a => { if (a.notas) notas[a.id] = a.notas; });
  const blob = new Blob([JSON.stringify(notas, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'notas_reuniao.json';
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

  const file = event.target.files[0]; if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const notas = JSON.parse(e.target.result);
      ARTIGOS.forEach(a => { if (notas[a.id]) a.notas = notas[a.id]; });
      _guardarLocal();

  reader.readAsText(file);
}
// ── FIM NOTAS ─────────────────────────────────────────────────────────────

let atual = 0;
let searchTerm = '';

/* ---- PESQUISA ---- */
function pesquisar(q) {
  searchTerm = q.trim().toLowerCase();
  const clearBtn = document.getElementById('clear-btn');
  if (clearBtn) clearBtn.style.display = searchTerm ? 'block' : 'none';
  if (searchTerm) {
    const primeiroIdx = ARTIGOS.findIndex(a => artMatch(a, searchTerm));
    if (primeiroIdx >= 0 && !artMatch(ARTIGOS[atual], searchTerm)) {
      atual = primeiroIdx;
    }
  }
  render();
}

function limparPesquisa() {
  searchTerm = '';
  const inp = document.getElementById('search-input');
  if (inp) inp.value = '';
  const clearBtn = document.getElementById('clear-btn');
  if (clearBtn) clearBtn.style.display = 'none';
  render();
}

function artMatch(art, q) {
  const div = art.divergencia || {};
  const campos = [
    art.id, art.tema,
    art.regulamento.ref, art.regulamento.titulo,
    art.regulamento.texto, art.regulamento.traducao,
    art.rgbeac.ref, art.rgbeac.texto,
    art.codigo.ref, art.codigo.texto,
    art.legislacao.ref, art.legislacao.texto,
    div.legislacao, div.codigo, div.rgbeac, div.sumario
  ];
  return campos.some(c => (c || '').toLowerCase().includes(q));
}

function getSnippet(art, q) {
  const div = art.divergencia || {};
  const campos = [
    art.regulamento.traducao, art.regulamento.texto,
    art.rgbeac.texto, art.codigo.texto,
    art.legislacao.texto,
    div.legislacao, div.codigo, div.rgbeac, div.sumario
  ];
  for (const c of campos) {
    const idx = (c || '').toLowerCase().indexOf(q);
    if (idx >= 0) {
      const s = Math.max(0, idx - 28);
      const e = Math.min(c.length, idx + q.length + 40);
      return (s > 0 ? '…' : '') +
             c.slice(s, e).replace(/\n/g, ' ') +
             (e < c.length ? '…' : '');
    }
  }
  return '';
}

function highlight(str) {
  if (!searchTerm || !str) return nl2br(str || '');
  const re = new RegExp(searchTerm.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'), 'gi');
  return nl2br(str.replace(re, m => `<mark>${m}</mark>`));
}

/* Formata texto legal com deteção automática de alíneas e subalíneas */
function hl(s) {
  if (!searchTerm || !s) return s || '';
  const re = new RegExp(searchTerm.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'), 'gi');
  return s.replace(re, m => `<mark>${m}</mark>`);
}

function formatarTexto(str) {
  if (!str) return '';
  const blocos = str.split(/\n\n+/);
  return blocos.map(bloco => {
    const isDim = bloco.startsWith('[dim]');
    const blockText = isDim ? bloco.slice(5) : bloco;
    const dimCls = isDim ? ' leg-dim' : '';
    const linhas = blockText.split('\n').filter(l => l.trim() !== '');
    if (!linhas.length) return '';
    const ps = linhas.map(linha => {
      const t = linha.trim();
      if (/^Artigo\s+\d+/i.test(t)) {
        return `<p class="leg-art-header">${hl(t)}</p>`;
      }
      if (/^[—–]\s/.test(t) || t === '—' || t === '–') {
        return `<p class="leg-sub">${hl(t)}</p>`;
      }
      if (/^[a-z]\)/.test(t) || /^\([a-z-]+\)/.test(t)) {
        return `<p class="leg-alinea">${hl(t)}</p>`;
      }
      return `<p class="leg-p">${hl(t)}</p>`;
    }).join('');
    return `<div class="leg-block${dimCls}">${ps}</div>`;
  }).join('');
}

function renderDiv(div, art) {
  if (!div) return '';

  // Grid 3 colunas: rgbeac, codigo, legislacao (ordem da legislação equivalente)
  const gridHTML = `
    <div class="divergencia-grid">
      <div class="div-col rgb">
        <div class="div-col-header">@rgbeac</div>
        <div class="div-col-body">${hl(div.rgbeac || '')}</div>
      </div>
      <div class="div-col cod">
        <div class="div-col-header">@codigo</div>
        <div class="div-col-body">${hl(div.codigo || '')}</div>
      </div>
      <div class="div-col leg">
        <div class="div-col-header">@legislacao</div>
        <div class="div-col-body">${hl(div.legislacao || '')}</div>
      </div>
    </div>
  `;

  // Sumário como linha comum abaixo
  const sumarioHTML = `
    <div class="div-sumario">
      <div class="div-sumario-header">Sumário / Proposta</div>
      <div class="div-sumario-body">${hl(div.sumario || '')}</div>
    </div>
  `;

  // Tabelas analíticas embebidas (se existirem)
  let tabelasHTML = '';
  if (art.tabelas && art.tabelas.length) {
    art.tabelas.forEach(tbl => {
      if (!tbl || !tbl.length) return;
      const header = tbl[0];
      const rows = tbl.slice(1);
      const thCells = header.map(h => `<th>${hl(h)}</th>`).join('');
      const trRows = rows.map(row =>
        `<tr>${row.map(c => `<td>${hl(c)}</td>`).join('')}</tr>`
      ).join('');
      tabelasHTML += `<div class="tabela-art-wrapper"><table class="tabela-art"><thead><tr>${thCells}</tr></thead><tbody>${trRows}</tbody></table></div>`;
    });
  }

  return gridHTML + sumarioHTML + tabelasHTML;
}

/* ---- SIDEBAR ---- */
function renderSidebar() {
  const nav = document.getElementById('sidebar');
  nav.innerHTML = '<h2>Artigos</h2>';
  let nResultados = 0;
  ARTIGOS.forEach((art, i) => {
    const mostrar = !searchTerm || artMatch(art, searchTerm);
    if (!mostrar) return;
    nResultados++;
    const btn = document.createElement('button');
    const snippet = searchTerm ? getSnippet(art, searchTerm) : '';
    btn.innerHTML =
      `<b>${art.id}</b><small>${art.tema}</small>` +
      (snippet ? `<em style="font-size:.7rem;opacity:.65;display:block;margin-top:3px;font-style:normal;">${
        snippet.replace(new RegExp(searchTerm.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'),'gi'),
                        m => `<mark>${m}</mark>`)
      }</em>` : '');
    btn.className = i === atual ? 'active' : '';
    btn.onclick = () => { atual = i; render(); };
    nav.appendChild(btn);
  });
  if (searchTerm) {
    const ct = document.createElement('div');
    ct.className = 'search-count';
    ct.textContent = nResultados > 0
      ? `${nResultados} resultado(s) para "${searchTerm}"`
      : 'Sem resultados.';
    nav.insertBefore(ct, nav.children[1]);
  }
}

/* ---- UTILIDADES ---- */
function nl2br(str) {
  return (str || '').replace(/\n/g, '<br>');
}

function render() {
  const art = ARTIGOS[atual];
  renderSidebar();
  document.getElementById('progresso').textContent =
    `${atual + 1} / ${ARTIGOS.length}`;

  document.getElementById('main-content').innerHTML = `
    <div class="art-badge">${art.id}</div>
    <div class="tema-title">${art.tema}</div>

    <div class="card reg" style="margin-bottom:14px;">
      <div class="card-header">
        @regulamento — ${art.regulamento.titulo}
        <span class="card-header-ref">${art.regulamento.ref} · Texto original EN</span>
      </div>
      <div class="card-body">
        ${marcarGlossario(formatarTexto(art.regulamento.texto), GLOSSARIO_EN)}
      </div>
    </div>

    <div class="card reg-tr" style="margin-bottom:20px;">
      <div class="card-header">
        @regulamento — Tradução PT-PT
        <span class="card-header-ref">${art.regulamento.ref}</span>
      </div>
      <div class="card-body">
        ${marcarGlossario(formatarTexto(art.regulamento.traducao), GLOSSARIO_PT)}
      </div>
    </div>

    <div class="grid">
      <div class="card rgb">
        <div class="card-header">@rgbeac (proposta jun. 2025)</div>
        <div class="card-body">
          <div class="card-ref">${art.rgbeac.ref}</div>
          ${formatarTexto(art.rgbeac.texto)}
        </div>
      </div>
      <div class="card cod">
        <div class="card-header">@codigo (DL n.º 214/2013)</div>
        <div class="card-body">
          <div class="card-ref">${art.codigo.ref}</div>
          ${formatarTexto(art.codigo.texto)}
        </div>
      </div>
      <div class="card leg">
        <div class="card-header">@legislacao (legislação vigente)</div>
        <div class="card-body">
          <div class="card-ref">${art.legislacao.ref}</div>
          ${formatarTexto(art.legislacao.texto)}
        </div>
      </div>
    </div>

    <div class="div-box">
      <strong>Divergência face ao Regulamento
        <span class="badge-alt">Necessidade de alteração: ${art.necessidade_alteracao}</span>
      </strong>
      ${renderDiv(art.divergencia, art)}
    </div>

    <div class="notas-box">
      <label>Notas de Reunião</label>
      <textarea id="notas-input" placeholder="Escreve aqui as decisões ou observações da reunião..."
        oninput="ARTIGOS[${atual}].notas = this.value; _guardarLocal();">${art.notas}</textarea>
      <div style="display:flex; gap:10px; align-items:center; margin-top:6px; flex-wrap:wrap;">
        <button class="btn btn-export" onclick="exportarJSON()"
                style="background:#1a5276; color:#fff;">
          Exportar notas (JSON)
        </button>
        <label class="btn btn-export" style="background:#2e7d32; color:#fff; cursor:pointer; margin:0;">
          Importar notas (JSON)
          <input type="file" accept=".json" onchange="importarJSON(event)" style="display:none;">
        </label>
        <span id="save-status" style="font-size:.8rem; color:#666;"></span>
      </div>
    </div>

    <div class="nav-btns">
      ${atual > 0 ? '<button class="btn btn-prev" onclick="navegar(-1)">← Anterior</button>' : ''}
      <button class="btn btn-export" onclick="exportarNotas()">Exportar Notas (CSV)</button>
      ${atual < ARTIGOS.length - 1 ? '<button class="btn btn-next" onclick="navegar(1)">Próximo →</button>' : ''}
    </div>
    <div id="export-msg"></div>
  `;
}

function navegar(dir) {
  atual = Math.max(0, Math.min(ARTIGOS.length - 1, atual + dir));
  render();
  window.scrollTo({top: 0, behavior: 'smooth'});
}

function exportarNotas() {
  const linhas = [['ID', 'Tema', 'Art. Regulamento', 'Art. RGBEAC', 'Art. Código',
                   'Art. Legislação Vigente', 'Div. @legislacao', 'Div. @codigo',
                   'Div. @rgbeac', 'Sumário', 'Necessidade Alteração', 'Notas de Reunião']];
  ARTIGOS.forEach(a => {
    const d = a.divergencia || {};
    linhas.push([
      a.id, a.tema,
      a.regulamento.ref, a.rgbeac.ref, a.codigo.ref,
      a.legislacao.ref,
      d.legislacao || '', d.codigo || '', d.rgbeac || '', d.sumario || '',
      a.necessidade_alteracao,
      a.notas
    ]);
  });
  const csv = linhas.map(r => r.map(c => `"${String(c).replace(/"/g,'""')}"`).join(',')).join('\n');
  const blob = new Blob([csv], {type: 'text/csv;charset=utf-8;'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'notas_reuniao_regulamento.csv';
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  const msg = document.getElementById('export-msg');
  if (msg) { msg.style.display = 'block'; msg.textContent = 'CSV exportado com as notas da reunião.'; }
}

// Iniciar — carregar notas do localStorage antes do primeiro render
_carregarLocal();
render();
</script>
